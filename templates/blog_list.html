{% extends "base.html" %}

{% block content %}
<div class="blog-list">
    <h1>Blog</h1>
    
    {% if posts %}
    <div class="post-list">
        {% for post in posts %}
        <article class="post-card">
            <a href="{{ post.url }}">
                <h2>{{ post.title }}</h2>
                <p class="post-meta">{{ post.date.strftime('%B %d, %Y') }}</p>
                {% if post.description %}
                <p class="post-description">{{ post.description }}</p>
                {% endif %}
            </a>
        </article>
        {% endfor %}
    </div>
    {% else %}
    <p class="empty-state">No posts yet. Check back soon!</p>
    {% endif %}
</div>
{% endblock %}
